name: Publish to npm

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - run: npm ci

      - run: npm test

      - run: npm run build

      - name: Check if version is already published
        id: version_check
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view costpilot@$PACKAGE_VERSION version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$PACKAGE_VERSION" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version $PACKAGE_VERSION already published — skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Version $PACKAGE_VERSION not yet published — will publish."
          fi

      - name: Publish to npm
        if: steps.version_check.outputs.skip == 'false'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
